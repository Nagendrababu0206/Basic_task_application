<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Auth Section -->
  <div id="auth-section">
    <div class="auth-container">
      <h1>Task Manager</h1>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
      </div>
      <form id="login-form" onsubmit="handleLogin(event)">
        <input type="text" id="login-username" placeholder="Username" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit" class="btn-primary">Login</button>
        <p id="login-error" class="error-msg"></p>
      </form>
      <form id="register-form" onsubmit="handleRegister(event)" style="display:none">
        <input type="text" id="register-username" placeholder="Username" required>
        <input type="password" id="register-password" placeholder="Password" required>
        <button type="submit" class="btn-primary">Register</button>
        <p id="register-error" class="error-msg"></p>
      </form>
    </div>
  </div>

  <!-- Main App Section -->
  <div id="app-section" style="display:none">
    <header>
      <h1>Task Manager</h1>
      <div class="user-info">
        <span id="username-display"></span>
        <button onclick="logout()" class="btn-logout">Logout</button>
      </div>
    </header>

    <main>
      <div class="add-task">
        <input type="text" id="task-input" placeholder="Add a new task..." maxlength="100">
        <textarea id="task-desc" placeholder="Description (optional)" rows="2"></textarea>
        <button onclick="addTask()" class="btn-primary">Add Task</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">All</button>
        <button class="filter-btn" data-filter="pending" onclick="setFilter(this)">Pending</button>
        <button class="filter-btn" data-filter="in_progress" onclick="setFilter(this)">In Progress</button>
        <button class="filter-btn" data-filter="completed" onclick="setFilter(this)">Completed</button>
      </div>

      <div id="tasks-container" class="tasks-container"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
